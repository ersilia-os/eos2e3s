Identifier: eos2e3s
Slug: antimicrobial-activity-paeruginosa
Status: In progress
Title: Antimicrobial activity prediction against Pseudomonas aeruginosa from 
  public ChEMBL data
Description: Bioactivity prediction of growth inhibition in Pseudomonas 
  aeruginosa, trained as binary (active/inactive) classifiers from publicly 
  available data in ChEMBL. Independent models are trained on multiple 
  bioactivity datasets, corresponding to single-point (percent inhibition) and 
  dose-response (MIC) assays, among others. A ranking score is provided for each
  model alongside a combined consensus score.
